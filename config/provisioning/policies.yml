apiVersion: 1

policies:
  - orgId: 1
    receiver: email-receiver
    groupBy:
      - alertname
      - severity
      - team
    groupWait: 30s
    groupInterval: 5m
    repeatInterval: 4h
    routes:
      - receiver: email-receiver
        matchers:
          - severity = critical
        continue: true
      - receiver: email-receiver
        matchers:
          - severity = warning

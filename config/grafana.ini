[server]
  http_addr = 0.0.0.0
  http_port = 3000
  root_url = https://lookout-grafana.fly.dev

[security]
  admin_user = admin
  admin_password = ${GF_SECURITY_ADMIN_PASSWORD}
  # JWT authentication configuration
  # Token will be validated against lookout-api's JWT endpoint
  disable_gravatar = true
  cookie_secure = true
  cookie_samesite = lax
  content_security_policy = true
  x_content_type_options = true
  x_xss_protection = true

[auth.jwt]
  enabled = true
  header_name = X-Auth-Token
  email_claim = email
  username_claim = email
  jwk_set_url = https://lookout-api.fly.dev/.well-known/jwks.json
  cache_ttl = 60m
  expected_claims = '{"aud": "lookout-grafana"}'

[users]
  default_theme = dark
  viewers_can_edit = false
  editors_can_admin = false
  auto_assign_org_role = Viewer

[dashboards]
  default_home_dashboard_path = /var/lib/grafana/dashboards/platform-team.json

[log]
  level = info
